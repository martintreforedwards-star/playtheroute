<!DOCTYPE html>
<html lang="en">
<img src="logo.svg" alt="The Route logo" class="logo">
<head>
  <meta charset="UTF-8">
  <title>The Route</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="comingSoon">
    <h1>The Route</h1>
    <p>Daily railway puzzle</p>
    <p><strong>Coming soon 🚆</strong></p>
  </div>

  <div id="game" style="display:none;">
    
    <div id="grid">
      <div class="row">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
      </div>
      <div class="row">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
      </div>
    </div>

    <input id="stationInput" placeholder="Enter station">
    <button onclick="submitStation()">Submit</button>

    <p>Tickets: <span id="tickets">5</span></p>

  </div>

  <script src="script.js"></script>

</body>
</html>
