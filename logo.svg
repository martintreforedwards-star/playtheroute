<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#0b0f14"/>

  <!-- Circle -->
  <circle cx="100" cy="100" r="85" stroke="#E8E6E3" stroke-width="6" fill="none"/>

  <!-- Main "r" route -->
  <path d="M80 150 L80 80 Q80 60 100 60 L150 60"
        stroke="#E8E6E3"
        stroke-width="6"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Subtle branch -->
  <path d="M80 95 L115 120"
        stroke="#E8E6E3"
        stroke-width="3"
        opacity="0.6"
        fill="none"
        stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="80" cy="95" r="6" fill="#2ecc71"/> <!-- green -->
  <circle cx="150" cy="60" r="6" fill="#e74c3c"/> <!-- red -->
  <circle cx="115" cy="120" r="4" fill="#E8E6E3" opacity="0.8"/> <!-- subtle -->
</svg>
