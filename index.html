<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Route</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <img src="logo.svg" alt="The Route logo" class="logo">

    <h1>The Route</h1>
    <p class="subtitle">Build the route. Find the pattern.</p>
    <p class="route">Thameslink • Easy</p>

    <!-- GRID -->
 <div class="grid">

  <!-- Column headers -->
  <div class="header-row">
    <div class="corner"></div>
    <div class="header">A1</div>
    <div class="header">A2</div>
    <div class="header">A3</div>
    <div class="header">A4</div>
  </div>

  <!-- Row 1 -->
  <div class="row">
    <div class="row-label">P1</div>
    <div class="cell" onclick="selectCell(this)"></div>
    <div class="cell" onclick="selectCell(this)"></div>
    <div class="cell" onclick="selectCell(this)"></div>
    <div class="cell" onclick="selectCell(this)"></div>
  </div>

  <!-- Row 2 -->
  <div class="row">
    <div class="row-label">P2</div>
    <div class="cell" onclick="selectCell(this)"></div>
    <div class="cell" onclick="selectCell(this)"></div>
    <div class="cell" onclick="selectCell(this)"></div>
    <div class="cell" onclick="selectCell(this)"></div>
  </div>

</div>
      <div class="row">
        <div class="cell" onclick="selectCell(this)"></div>
        <div class="cell" onclick="selectCell(this)"></div>
        <div class="cell" onclick="selectCell(this)"></div>
        <div class="cell" onclick="selectCell(this)"></div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <input id="stationInput" placeholder="Enter station">
      <button onclick="placeStation()">Add</button>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
