<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Route</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <img src="logo.svg" alt="The Route logo" class="logo">

    <h1>The Route</h1>
    <p class="subtitle">Build the route. Find the pattern.</p>
    <p class="route">Thameslink • Easy</p>

    <div class="grid">

      <!-- Top title -->
      <div class="top-title">SERVICE UPDATES</div>

      <!-- Column headers -->
      <div class="corner"></div>
      <div class="header">1</div>
      <div class="header">2</div>
      <div class="header">3</div>
      <div class="header">4</div>

      <!-- Platform 1 -->
      <div class="row-label">Platform 1</div>
      <div class="cell" onclick="selectCell(this)"></div>
      <div class="cell" onclick="selectCell(this)"></div>
      <div class="cell" onclick="selectCell(this)"></div>
      <div class="cell" onclick="selectCell(this)"></div>

      <!-- Platform 2 -->
      <div class="row-label">Platform 2</div>
      <div class="cell" onclick="selectCell(this)"></div>
      <div class="cell" onclick="selectCell(this)"></div>
      <div class="cell" onclick="selectCell(this)"></div>
      <div class="cell" onclick="selectCell(this)"></div>

    </div>

    <div class="input-area">
      <input id="stationInput" placeholder="Enter station">
      <button onclick="placeStation()">Add</button>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
