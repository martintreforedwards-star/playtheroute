<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" stroke="#E6E6E6" stroke-width="4"/>

  <!-- Main route (the "r") -->
  <path d="M80 140 L80 80 Q80 60 100 60 L140 60"
        stroke="#E6E6E6"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Subtle branch -->
  <path d="M80 100 L110 120"
        stroke="#E6E6E6"
        stroke-width="4"
        stroke-linecap="round"
        opacity="0.6"/>

  <!-- Station nodes -->

  <!-- Green junction -->
  <circle cx="80" cy="100" r="7" fill="white" stroke="#34A853" stroke-width="3"/>

  <!-- Red terminus -->
  <circle cx="140" cy="60" r="7" fill="white" stroke="#EA4335" stroke-width="3"/>

  <!-- Subtle grey node -->
  <circle cx="110" cy="120" r="6" fill="white" stroke="#B0B0B0" stroke-width="2"/>

</svg>